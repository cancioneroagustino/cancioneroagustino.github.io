<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Programa con Acordes - Cancionero Católico</title>
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <script src="./scripts/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/cancionero.css">
    
    <script src="https://www.cancionerocatolico.cl/scripts/jquery.min.js"></script>
    <script src="scripts/transpositor.js"></script>

    <style>
        /* Estilo para que el listado se vea bien centrado */
        .cancion-content {
            flex-direction: column;
            align-items: center;
        }
        /* Ocultamos los botones automáticos que el plugin inyecta por defecto 
           para que no se repitan en cada canción del listado */
        .cancion-content .d-flex.justify-content-center.gap-2.mb-3 {
            display: none !important;
        }
    </style>
</head>

<body>
  <div id="nav-placeholder"></div>
  <script>
    $(function(){
      $("#nav-placeholder").load("navbar.html");
    });
  </script>

  <div id="global-controls" class="d-flex justify-content-center mt-4"></div>

  <div id="programa-acordes-container" class="d-flex flex-column mt-3"></div>

  <script>
  // --- Lee el programa desde localStorage (Intacto) ---
  const programa = JSON.parse(localStorage.getItem('programaMisa'));
  if (!programa || programa.length === 0) {
    alert('No hay un programa de misa guardado.');
    window.location.href = 'crear-programa.html';
  }

  // --- Helper: cargar datos de la canción (Intacto) ---
  async function fetchCancionData(ruta) {
    const res = await fetch(ruta);
    if (!res.ok) throw new Error('Error al cargar ' + ruta);
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');

    const titleEl = doc.querySelector('title');
    const title = titleEl ? titleEl.innerText : 'Sin título';

    const pre = doc.querySelector('pre#letra');
    if (!pre) throw new Error('No se encontró <pre id="letra"> en ' + ruta);

    const preInner = pre.innerHTML;
    const dataKey = pre.getAttribute('data-key') || '';

    return { title, preInner, dataKey };
  }

  // --- Insertar canción en el DOM y aplicar transposición (Corregido) ---
  async function insertarYCambiarSiCorresponde(container, ruta, tonoDeseado) {
    try {
      const { title, preInner, dataKey: tonoOriginal } = await fetchCancionData(ruta);

      // Estructura DOM simplificada y unificada
      const col = document.createElement("div");
      col.className = "col-12 col-md-8 col-lg-6 align-self-center mb-5"; // Ajuste de ancho y margen

      const article = document.createElement("div");
      article.className = "cancion-content";

      const h2 = document.createElement("h2");
      h2.textContent = title;
      h2.className = "text-center mb-3";
      article.appendChild(h2);

      const pre = document.createElement("pre");
      pre.className = "letra"; // Clase unificada
      pre.setAttribute("data-key", tonoOriginal);
      pre.innerHTML = preInner;
      article.appendChild(pre);

      col.appendChild(article);
      container.appendChild(col);

      // --- MODIFICACIÓN 3: Inicialización Directa con jQuery Global ---
      // Como ya cargamos los scripts arriba, no necesitamos promesas ni timeouts aquí.
      if (typeof jQuery.fn.transpose === "function") {
        const $pre = jQuery(pre);
        
        // Inicializamos el plugin. 
        // Nota: Los estilos CSS arriba ocultarán los botones automáticos indeseados.
        $pre.transpose();

        // Lógica de cambio de tono original (Intacta)
        if (tonoDeseado && tonoDeseado !== tonoOriginal) {
          const claveObjetivo = tonoDeseado.replace(/m$/i, "");
          const $keysBlock = $pre.prev(".transpose-keys"); // Usamos el selector correcto
          const $link = $keysBlock
            .find("a")
            .filter(function () {
              return (
                jQuery(this).data('original-note').toUpperCase() === // Validación robusta con data
                claveObjetivo.toUpperCase()
              );
            })
            .first();
          if ($link.length) {
            $link.trigger("click");
          } else {
            console.warn("No se encontró enlace de tono", claveObjetivo, "para", ruta);
          }
        }
      }
    } catch (err) {
      console.warn("⚠️ Error menor o falta de tonalidad en:", ruta, err.message);
    }
  }

  // --- MODIFICACIÓN 4: Configuración de la Interfaz Global ---
  function setupGlobalInterface() {
    // 1. Inyectamos UN SOLO botón global de Notación
    const $btnNotation = $('<button id="toggleNotationButton" class="btn btn-acordes btn-sm" data-format="Solfeo">Notación ABC</button>');
    $('#global-controls').append($btnNotation);

    // 2. Definimos su evento para que afecte a TODO el listado
    $btnNotation.click(function() {
        var $btn = $(this);
        var isCurrentlyABC = $btn.data('format') === 'ABC';
        
        // Cambiamos el estado
        $btn.data('format', isCurrentlyABC ? 'Solfeo' : 'ABC');
        // Cambiamos el texto del botón
        $btn.text(isCurrentlyABC ? 'Notación ABC' : 'Notación DoReMi');
        
        // Ejecutamos la función de refresco visual unificada (que ya existe en transpositor.js)
        if (typeof refreshNotation === "function") {
            refreshNotation();
        }
    });
  }

  // --- Mostrar todas las canciones del programa ---
  async function mostrarProgramaConAcordes() {
    const container = document.getElementById('programa-acordes-container');

    // 1. Configuramos la interfaz global UNA VEZ
    setupGlobalInterface();

    // 2. Procesamos las canciones secuencialmente
    for (const item of programa) {
      await insertarYCambiarSiCorresponde(container, item.cancion, item.tono);
    }
    
    // 3. Al finalizar, nos aseguramos de que todo esté en la notación correcta
    // por si el usuario ya presionó el botón mientras cargaban
    if (typeof refreshNotation === "function") {
        refreshNotation();
    }
  }

  // Ejecutar
  $(function() {
      mostrarProgramaConAcordes();
  });
  </script>
</body>
</html>
