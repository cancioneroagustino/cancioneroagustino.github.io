<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Lista con Acordes - Cancionero Católico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link href="/css/bootstrap.min.css" rel="stylesheet">
<script src="/scripts/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/cancionero.css">
<script src="/scripts/jquery.min.js"></script>
<style>
    /* Estilos para impresión y visualización */
    .misa-header {
        border-bottom: 3px double #004a99;
        margin-bottom: 30px;
        padding-bottom: 10px;
    }
    .cancion-print-block {
        page-break-inside: avoid; /* Evita que una canción se corte a la mitad al imprimir */
        margin-bottom: 40px;
        border-bottom: 1px solid #eee;
        padding-bottom: 20px;
    }
    .cancion-title {
        color: #004a99;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 15px;
    }
    .seccion-tag {
        font-size: 0.8em;
        background: #004a99;
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        vertical-align: middle;
        margin-right: 10px;
    }
    @media print {
        #nav-placeholder, .no-print, .transpose-keys {
            display: none !important;
        }
        body { background: white; }
        .container { max-width: 100% !important; width: 100% !important; }
    }
</style>
</head>

<body>
  <div id="nav-placeholder"></div>
  <script>$(function(){ $("#nav-placeholder").load("navbar.html"); });</script>

  <main class="container mt-5">
    <div class="misa-header text-center">
        <h1 id="displayNombreMisa" class="fw-bold">PROGRAMA DE MISA</h1>
        <div class="no-print mt-3">
            <button id="toggleNotationButton" class="btn btn-outline-primary btn-sm" data-format="Solfeo">Cambiar a Notación ABC</button>
            <button onclick="window.print()" class="btn btn-primary btn-sm ms-2">🖨️ Imprimir / Guardar PDF</button>
        </div>
    </div>

    <div id="programa-acordes-container" class="row justify-content-center">
        <div class="text-center" id="loading-status">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Generando listado con acordes...</p>
        </div>
    </div>
  </main>

  <script src="scripts/transpositor.js"></script>

  <script>
    const programa = JSON.parse(localStorage.getItem('programaMisa'));
    const nombreMisa = localStorage.getItem('nombreMisaActual');

    if (!programa || programa.length === 0) {
        alert('No hay un programa guardado.');
        window.location.href = 'crear-programa.html';
    }

    // Mostrar el título de la misa
    if (nombreMisa) {
        document.getElementById('displayNombreMisa').textContent = nombreMisa;
        document.title = nombreMisa + " - Acordes";
    }

    // Función para procesar todas las canciones una tras otra
    async function cargarTodoElPrograma() {
        const container = document.getElementById('programa-acordes-container');
        
        for (const item of programa) {
            try {
                const res = await fetch(item.cancion);
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const preOriginal = doc.querySelector('pre#letra');

                if (preOriginal) {
                    const block = document.createElement('div');
                    block.className = 'col-12 col-lg-10 cancion-print-block';
                    
                    block.innerHTML = `
                        <h2 class="cancion-title">
                            <span class="seccion-tag">${item.seccion}</span>${item.nombre}
                        </h2>
                        <pre class="letra" data-key="${preOriginal.getAttribute('data-key')}">${preOriginal.innerHTML}</pre>
                    `;
                    
                    container.appendChild(block);

                    // Inicializar transposición inmediatamente para este bloque
                    const $pre = $(block).find('pre');
                    $pre.transpose();

                    // Aplicar el tono guardado
                    aplicarTonoEspecifico($pre, item.tono);
                }
            } catch (e) {
                console.error("Error cargando canción:", item.nombre, e);
            }
        }
        document.getElementById('loading-status').remove();
    }

    function aplicarTonoEspecifico($el, tonoDeseado) {
        if (!tonoDeseado) return;
        const tonoOriginal = $el.attr('data-key');
        if (tonoOriginal === tonoDeseado) return;

        const claveObjetivo = tonoDeseado.replace(/m$/i, "").toUpperCase();
        const $link = $el.prev(".transpose-keys").find("a").filter(function() {
            return $(this).text().toUpperCase() === claveObjetivo;
        }).first();

        if ($link.length) $link.trigger("click");
    }

    // Lógica del botón de notación (DoReMi / ABC)
    document.getElementById('toggleNotationButton').addEventListener('click', function() {
        const currentFormat = this.getAttribute('data-format');
        const newFormat = currentFormat === 'Solfeo' ? 'ABC' : 'Solfeo';
        
        this.setAttribute('data-format', newFormat);
        this.textContent = newFormat === 'Solfeo' ? 'Cambiar a Notación ABC' : 'Cambiar a Notación DoReMi';

        if (typeof window.refreshNotation === "function") {
            window.refreshNotation();
        }
    });

    // Iniciar carga
    window.addEventListener('DOMContentLoaded', cargarTodoElPrograma);
  </script>
</body>
</html>
