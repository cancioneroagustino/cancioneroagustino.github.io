<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Programa con Acordes - Cancionero Católico</title>
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <script src="./scripts/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/cancionero.css">
    
    <script src="https://www.cancionerocatolico.cl/scripts/jquery.min.js"></script>
    <script src="scripts/transpositor.js"></script>

    <style>
    /* Centrado global de la canción manteniendo alineación interna */
    .cancion-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center; /* Centra el bloque h2 + pre en la pantalla */
        width: 100%;
    }
    .letra {
        display: inline-block; /* Hace que el pre se ajuste a su línea más larga */
        text-align: left;      /* Mantiene los acordes sobre las letras */
        margin: 0 auto;
        background: transparent;
        border: none;
        font-family: monospace;
    }
    /* Ocultar botones internos automáticos en el listado */
    .cancion-wrapper .d-flex.justify-content-center.gap-2.mb-3 {
        display: none !important;
    }
</style>
</head>

<body>
  <div id="nav-placeholder"></div>
  <script>
    $(function(){
      $("#nav-placeholder").load("navbar.html");
    });
  <script>
const programa = JSON.parse(localStorage.getItem('programaMisa'));
if (!programa || programa.length === 0) {
    alert('No hay un programa de misa guardado.');
    window.location.href = 'crear-programa.html';
}

async function fetchCancionData(ruta) {
    const res = await fetch(ruta);
    if (!res.ok) throw new Error('Error al cargar ' + ruta);
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');
    const title = doc.querySelector('title') ? doc.querySelector('title').innerText : 'Sin título';
    const pre = doc.querySelector('pre#letra');
    if (!pre) throw new Error('No se encontró <pre id="letra">');
    return { title, preInner: pre.innerHTML, dataKey: pre.getAttribute('data-key') || '' };
}

async function insertarYCambiarSiCorresponde(container, ruta, tonoDeseado) {
    try {
        const { title, preInner, dataKey: tonoOriginal } = await fetchCancionData(ruta);

        // Contenedor principal de la canción (Wrapper para centrado)
        const col = $('<div class="col-12 mb-5 cancion-wrapper"></div>');
        
        const h2 = $('<h2 class="text-center"></h2>').text(title);
        const pre = $('<pre class="letra"></pre>')
                    .attr("data-key", tonoOriginal)
                    .html(preInner);

        col.append(h2).append(pre);
        $(container).append(col);

        // Inicializar el plugin en esta canción específica
        pre.transpose();

        // Aplicar cambio de tono si es necesario
        if (tonoDeseado && tonoDeseado !== tonoOriginal) {
            const claveObjetivo = tonoDeseado.replace(/m$/i, "").toUpperCase();
            // Buscamos en la barra de tonalidades que el plugin acaba de inyectar
            const $link = col.find(".transpose-keys a").filter(function() {
                return ($(this).data('original-note') || $(this).text()).toUpperCase() === claveObjetivo;
            }).first();

            if ($link.length) $link.trigger("click");
        }
    } catch (err) {
        console.warn("Error en canción:", ruta, err);
    }
}

function setupGlobalInterface() {
    const $btnNotation = $('<button id="toggleNotationButton" class="btn btn-acordes btn-sm" data-format="Solfeo">Notación ABC</button>');
    $('#global-controls').empty().append($btnNotation);

    $btnNotation.on('click', function() {
        const isABC = $(this).data('format') === 'ABC';
        $(this).data('format', isABC ? 'Solfeo' : 'ABC')
               .text(isABC ? 'Notación ABC' : 'Notación DoReMi');
        
        // Ejecución forzada: refreshNotation() debe estar disponible globalmente en transpositor.js
        if (typeof refreshNotation === "function") {
            refreshNotation();
        }
    });
}

async function mostrarProgramaConAcordes() {
    const container = document.getElementById('programa-acordes-container');
    setupGlobalInterface();

    for (const item of programa) {
        await insertarYCambiarSiCorresponde(container, item.cancion, item.tono);
    }

    // Asegurar que si el botón global ya estaba en ABC, las canciones nuevas se conviertan
    if ($('#toggleNotationButton').data('format') === 'ABC') {
        refreshNotation();
    }
}

$(function() {
    mostrarProgramaConAcordes();
});
</script>
</body>
</html>
